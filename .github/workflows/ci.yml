name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - name: Verify bundle size ≤10kb gzipped
        run: |
          SIZE=$(gzip -c dist/index.global.js | wc -c)
          echo "IIFE bundle gzipped: ${SIZE} bytes"
          if [ "$SIZE" -gt 10240 ]; then
            echo "ERROR: bundle exceeds 10kb budget (${SIZE} bytes)" >&2
            exit 1
          fi
